<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="64" height="64" rx="14" fill="url(#shine)"/>

  <!-- Code brackets < > -->
  <text x="4" y="44" font-family="monospace" font-size="28" font-weight="bold" fill="white" opacity="0.35">&lt;</text>
  <text x="44" y="44" font-family="monospace" font-size="28" font-weight="bold" fill="white" opacity="0.35">&gt;</text>

  <!-- AKI text centered -->
  <text x="32" y="41" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="white" letter-spacing="1">AKI</text>
</svg>
